<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praise Dynasty | High-Security Admin Gateway</title>
        <!-- favicon -->
<link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
<link rel="shortcut icon" href="favicon/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png" />
<link rel="manifest" href="favicon/site.webmanifest" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-blue': '#001b3a',
                        'brand-magenta': '#c8102e',
                        'brand-light': '#f4f4f4'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    }
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
</head>
<!-- In any event an edit should be made pls go thru the comments to see how the site was structured and there sections to navigate easily -->

<body
    class="bg-gray-900 min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8 font-sans selection:bg-brand-magenta selection:text-white">
    <!-- Abstract Design Background, Review when you check the site hope the Design is Ok ??? -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-0 right-0 -mr-20 -mt-20 w-80 h-80 rounded-full bg-brand-magenta/10 blur-3xl"></div>
        <div class="absolute bottom-0 left-0 -ml-20 -mb-20 w-96 h-96 rounded-full bg-blue-900/10 blur-3xl"></div>
    </div>

    <!-- Login Container -->
    <div class="sm:mx-auto sm:w-full sm:max-w-md relative z-10 transition-all duration-500 ease-in-out transform scale-100 opacity-100"
        id="login-container">
        <!-- Logo Header -->
        <div class="text-center">
            <div
                class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-gray-800 shadow-xl border border-gray-700 mb-6 group hover:border-brand-magenta transition-colors duration-300">
                <!-- Lock Icon -->
                <svg class="w-10 h-10 text-brand-magenta group-hover:scale-110 transition-transform duration-300"
                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                    </path>
                </svg>
            </div>
            <h2 class="text-3xl font-extrabold text-white tracking-tight">Enterprise Access</h2>
            <p class="mt-2 text-sm text-gray-400 font-medium tracking-wide uppercase">Praise Dynasty Internal Gateway
            </p>
        </div>

        <div class="mt-8 bg-gray-800 py-8 px-4 shadow-2xl sm:rounded-2xl sm:px-10 border border-gray-700">
            <form class="space-y-6" id="login-form">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-300">Secure Email Address</label>
                    <div class="mt-2 relative rounded-md shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207">
                                </path>
                            </svg>
                        </div>
                        <input id="email" name="email" type="email" autocomplete="email" required
                            class="appearance-none block w-full px-3 py-3 pl-10 border border-gray-600 rounded-xl shadow-sm placeholder-gray-500 focus:outline-none focus:ring-brand-magenta focus:border-brand-magenta sm:text-sm bg-gray-900 text-white transition-colors">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300">Access Token /
                        Password</label>
                    <div class="mt-2 relative rounded-md shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                                </path>
                            </svg>
                        </div>
                        <input id="password" name="password" type="password" autocomplete="current-password" required
                            class="appearance-none block w-full px-3 py-3 pl-10 border border-gray-600 rounded-xl shadow-sm placeholder-gray-500 focus:outline-none focus:ring-brand-magenta focus:border-brand-magenta sm:text-sm bg-gray-900 text-white transition-colors">
                    </div>
                </div>

                <div>
                    <button type="submit" id="login-btn"
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-lg text-sm font-bold text-white bg-brand-magenta hover:bg-rose-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-magenta focus:ring-offset-gray-900 transition-all duration-300 hover:-translate-y-0.5 mt-2 tracking-widest uppercase">
                        Secure Login
                    </button>
                </div>
            </form>

            <!-- Alert Node -->
            <div id="auth-alert" class="hidden mt-6 p-4 rounded-xl text-center font-medium text-sm border"></div>
        </div>

        <div class="mt-10 text-center">
            <p class="text-xs text-gray-600 font-medium tracking-wider">&copy; 2026 Praise Dynasty Systems. All traffic
                monitored.</p>
        </div>
    </div>

    <!-- Firebase Auth Engine -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJBGi_WKLDU493eOrH4Emx7xx_li7wzoY",
            authDomain: "praise-dynasty-hni.firebaseapp.com",
            projectId: "praise-dynasty-hni",
            storageBucket: "praise-dynasty-hni.firebasestorage.app",
            messagingSenderId: "702909860929",
            appId: "1:702909860929:web:7c9d2a3c899df3dbf0cac0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const alertNode = document.getElementById('auth-alert');

        function showAlert(message, type = 'error') {
            alertNode.innerText = message;
            alertNode.classList.remove('hidden', 'bg-red-900/50', 'text-red-400', 'border-red-900', 'bg-green-900/50', 'text-green-400', 'border-green-900');

            if (type === 'error') {
                alertNode.classList.add('bg-red-900/50', 'text-red-400', 'border-red-900');
            } else {
                alertNode.classList.add('bg-green-900/50', 'text-green-400', 'border-green-900');
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) return;

            const originalBtnText = loginBtn.innerText;
            loginBtn.innerText = 'Authenticating...';
            loginBtn.disabled = true;
            loginBtn.classList.add('opacity-75', 'cursor-not-allowed');
            alertNode.classList.add('hidden');

            try {
                // Initialize Secure Payload
                await signInWithEmailAndPassword(auth, email, password);

                // Auth Success
                showAlert('Gateway Open. Redirecting...', 'success');
                loginBtn.innerText = 'Redirecting...';

                // Micro-delay for visual UI feedback
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 800);

            } catch (error) {
                console.error("Auth Fail Context:", error);

                let errorMsg = 'Invalid credentials.';
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                    errorMsg = 'Invalid email or password. Access Denied.';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMsg = 'Too many attempts. Account locked temporarily.';
                }

                showAlert(errorMsg, 'error');

                // Reset Button
                loginBtn.innerText = originalBtnText;
                loginBtn.disabled = false;
                loginBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        });
    </script>
</body>

</html>
